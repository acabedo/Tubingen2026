name: clean-install
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  reproduce:
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest, ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: Oralstats
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Librerías de sistema (solo Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavfilter-dev libavformat-dev libavcodec-dev libavutil-dev libswscale-dev \
            libfftw3-dev libsndfile1-dev libcurl4-openssl-dev libssl-dev libxml2-dev
      - name: Restaurar paquetes R (no transaccional)
        continue-on-error: true
        run: Rscript -e "options(renv.config.install.transactional = FALSE); install.packages('renv', repos='https://cloud.r-project.org'); renv::restore(prompt = FALSE)"
      - name: Verificar que el núcleo carga
        run: Rscript -e "pk <- c('shiny','bslib','shinyjs','ggplot2','dplyr','tidyr','DT','plotly','RColorBrewer','data.table','jsonlite','seewave','tuneR','reticulate'); for (p in pk) library(p, character.only = TRUE); cat('NUCLEO OK\n')"
      - name: Bootstrap Python (core)
        run: Rscript R/setup_python.R core
      - name: Test de helpers de portabilidad
        run: Rscript tests/test_portability.R
